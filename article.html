<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Article — Meridian Post</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="P"></div><div id="N"></div><div id="A"></div><div id="T"></div><div id="C"></div>

<div class="breadcrumb">
  <a href="index.html">Home</a>
  <span class="breadcrumb-sep">›</span>
  <span class="breadcrumb-current" id="breadCat">Article</span>
</div>

<div class="article-page">
  <div>
    <button class="article-back" onclick="history.back()">← Back</button>
    <div id="articleContent">
      <div class="skeleton skel-line" style="height:12px;width:100px;margin-bottom:14px"></div>
      <div class="skeleton skel-line skel-l" style="height:32px;margin-bottom:8px"></div>
      <div class="skeleton skel-line skel-m" style="height:32px;margin-bottom:20px"></div>
      <div class="skeleton" style="width:100%;aspect-ratio:16/6;border-radius:9px;margin-bottom:26px"></div>
      <div class="skeleton skel-line skel-l" style="height:14px;margin-bottom:8px"></div>
      <div class="skeleton skel-line skel-l" style="height:14px;margin-bottom:8px"></div>
      <div class="skeleton skel-line skel-m" style="height:14px"></div>
    </div>

    <!-- RELATED -->
    <div id="relatedSection" style="display:none;margin-top:48px">
      <div class="sec-head"><span class="sec-label">Related Articles</span><div class="sec-line"></div></div>
      <div class="cards-grid" id="relatedGrid"></div>
    </div>
  </div>

  <aside class="sidebar" style="padding-top:60px">
    <div class="widget widget-glass">
      <div class="widget-title"><span class="widget-title-left">📊 Markets</span></div>
      <div id="marketWidget"></div>
    </div>
    <div class="widget">
      <div class="widget-title"><span class="widget-title-left">🗂️ Browse</span></div>
      <div class="sec-links">
        <a href="index.html" class="sec-link">🌐 Home <span>→</span></a>
        <a href="geopolitics.html" class="sec-link">🌍 Geopolitics <span>→</span></a>
        <a href="world-politics.html" class="sec-link">🏛️ World Politics <span>→</span></a>
        <a href="markets.html" class="sec-link">📈 Markets <span>→</span></a>
        <a href="technology.html" class="sec-link">💻 Technology <span>→</span></a>
      </div>
    </div>
  </aside>
</div>

<div id="F"></div><div id="PW"></div><div id="ED"></div><div id="TO"></div><div id="BT"></div><div id="PB"></div>

<script src="app.js"></script>
<script>
document.getElementById('P').innerHTML = progressHTML();
document.getElementById('N').innerHTML = navHTML('');
document.getElementById('A').innerHTML = alertHTML();
document.getElementById('T').innerHTML = tickerHTML();
document.getElementById('C').innerHTML = clockHTML();
document.getElementById('F').innerHTML = footerHTML();
document.getElementById('PW').innerHTML = pwdModalHTML();
document.getElementById('ED').innerHTML = editorModalHTML();
document.getElementById('TO').innerHTML = toastHTML();
document.getElementById('BT').innerHTML = backTopHTML();
initPage('');

const articleId = localStorage.getItem('mp-pub-id');
if (!articleId) { window.location.href = 'index.html'; }

const catMeta = {
  'Geopolitics':'linear-gradient(135deg,#1a1a2e,#16213e)',
  'World Politics':'linear-gradient(135deg,#0d1b2a,#1b2a3a)',
  'Markets':'linear-gradient(135deg,#0a1a0a,#1a2a1a)',
  'Technology':'linear-gradient(135deg,#1a0a2e,#2d1a4a)',
  'Opinion':'linear-gradient(135deg,#1a1400,#3a2c00)'
};
const catCls = {
  'Geopolitics':'cat-geo','World Politics':'cat-pol',
  'Markets':'cat-mkt','Technology':'cat-tech','Opinion':'cat-opin'
};

async function loadArticle() {
  const a = await getArticleById(articleId);
  if (!a) { window.location.href = 'index.html'; return; }
  document.title = a.title + ' — Meridian Post';
  const bc = document.getElementById('breadCat');
  if (bc) bc.textContent = a.category;
  const bg = catMeta[a.category] || catMeta['Geopolitics'];
  const cls = catCls[a.category] || 'cat-geo';
  const paras = (a.body||'').split(/\n\n+/).filter(p=>p.trim());
  const rt = readTime(a.body||'');
  const url = window.location.href;

  document.getElementById('articleContent').innerHTML =
    '<div class="article-cat ' + cls + '">' + escH(a.category) + '</div>' +
    '<h1 class="article-h1">' + escH(a.title) + '</h1>' +
    '<div class="article-cover-ph" style="background:' + bg + '">' + escH(a.icon||'🌍') + '</div>' +
    '<div class="article-meta">' +
      '<span class="src">J. Asghar</span>' +
      '<span>Founder &amp; Editor, Meridian Post</span>' +
      '<span>' + timeAgo(a.created_at) + '</span>' +
      '<span>⏱ ' + rt + ' min read</span>' +
      (a.views ? '<span>👁 ' + a.views + ' views</span>' : '') +
    '</div>' +
    '<div class="article-body">' +
      paras.map((p,i) => '<p' + (i===0?' style="font-size:1.08rem"':'') + '>' + escH(p.trim()) + '</p>').join('') +
    '</div>' +
    '<div class="article-share">' +
      '<span class="share-label">Share:</span>' +
      '<button class="share-btn" onclick="shareArticle(\'' + escA(a.title) + '\',\'' + escA(url) + '\')">🔗 Copy Link</button>' +
      '<button class="share-btn share-btn-wa" onclick="shareWA(\'' + escA(a.title) + '\',\'' + escA(url) + '\')">WhatsApp</button>' +
      '<button class="share-btn share-btn-tw" onclick="shareTW(\'' + escA(a.title) + '\',\'' + escA(url) + '\')">Twitter / X</button>' +
    '</div>' +
    (editorUnlocked ? '<div style="display:flex;gap:10px;margin-top:28px;padding-top:22px;border-top:1px solid var(--border)">' +
      '<button class="btn-xs" onclick="openEditor(' + a.id + ')">✏️ Edit</button>' +
      '<button class="btn-xs btn-xs-del" onclick="handleDelArticle(' + a.id + ')">🗑 Delete</button>' +
    '</div>' : '');

  await incrementViews(articleId);
  loadRelated(a.category, a.id);
}

async function loadRelated(category, currentId) {
  try {
    const all = await sbFetch('articles?is_draft=eq.false&category=eq.' + encodeURIComponent(category) + '&select=id,title,excerpt,category,icon,created_at&limit=4');
    const filtered = all.filter(a => a.id != currentId).slice(0,2);
    if (!filtered.length) return;
    const section = document.getElementById('relatedSection');
    const grid = document.getElementById('relatedGrid');
    if (!section||!grid) return;
    section.style.display = 'block';
    const cls = catCls[category] || 'cat-geo';
    const bg = catMeta[category] || catMeta['Geopolitics'];
    grid.innerHTML = filtered.map(a =>
      '<div class="card" onclick="goPub(' + a.id + ')">' +
        '<div class="card-img" style="background:' + bg + '"><div class="card-img-fallback" style="background:' + bg + '">' + escH(a.icon||'🌍') + '</div></div>' +
        '<div class="card-cat ' + cls + '">' + escH(a.category) + '</div>' +
        '<div class="card-title">' + escH(a.title) + '</div>' +
        '<div class="card-excerpt">' + escH(a.excerpt||'') + '</div>' +
        '<div class="card-footer"><span class="card-src"><span class="card-dot"></span>J. Asghar</span><span>' + timeAgo(a.created_at) + '</span></div>' +
      '</div>'
    ).join('');
  } catch {}
}

async function handleDelArticle(id) {
  if (!editorUnlocked) return;
  if (!confirm('Delete this article permanently?')) return;
  try { await deleteArticle(id); showToast('Deleted.'); setTimeout(()=>window.location.href='index.html',1500); }
  catch { showToast('Error.'); }
}

loadArticle();
</script>
</body>
</html>
